name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore EfCore.Enterprise.sln --source https://api.nuget.org/v3/index.json

      - name: Build
        run: dotnet build EfCore.Enterprise.sln -c Release --no-restore

      - name: Pack Framework
        run: dotnet pack EfCore.Enterprise.sln -c Release --no-build -o nupkgs

      - name: Copy Framework Packages to Template
        run: |
          mkdir -p tools/EfCore.Enterprise.Templates/content/local-packages || true
          cp nupkgs/EfCore.Enterprise.Domain.1.0.1.nupkg tools/EfCore.Enterprise.Templates/content/local-packages/
          cp nupkgs/EfCore.Enterprise.Shared.1.0.1.nupkg tools/EfCore.Enterprise.Templates/content/local-packages/
          cp nupkgs/EfCore.Enterprise.Application.1.0.1.nupkg tools/EfCore.Enterprise.Templates/content/local-packages/
          cp nupkgs/EfCore.Enterprise.Infrastructure.1.0.1.nupkg tools/EfCore.Enterprise.Templates/content/local-packages/

      - name: Pack Tools
        run: |
          dotnet build tools/EfCore.Enterprise/EfCore.Enterprise.csproj -c Release
          dotnet pack tools/EfCore.Enterprise/EfCore.Enterprise.csproj -c Release --no-build -o nupkgs
          dotnet build tools/EfCore.Enterprise.Templates/EfCore.Enterprise.Templates.csproj -c Release
          dotnet pack tools/EfCore.Enterprise.Templates/EfCore.Enterprise.Templates.csproj -c Release --no-build -o nupkgs

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: nupkgs/*.nupkg
          generate_release_notes: true